services:
  db:
    image: postgres:16
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data:/var/lib/postgresql/data

  odoo19:
    image: odoo:19.0
    restart: always
    depends_on:
      - db
    ports:
      - "8068:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./config/odoo.conf:/etc/odoo/odoo.conf
      - ./addons:/mnt/extra-addons
    command: odoo -d odoo_db -u auth_signup_extension --dev=xml --db_user=odoo --db_password=odoo --db_host=db
    #-i base for the first time
    # odoo -d odoo_db -i base --dev=xml --db_user=odoo --db_password=odoo --db_host=db
    # odoo -d odoo_db -u customer_registration --dev=xml --db_user=odoo --db_password=odoo --db_host=db
    

volumes:
  odoo-web-data:
  odoo-db-data:
  odoo-web-data2:
